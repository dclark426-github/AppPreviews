<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>App Gallery</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #f6f8fa; color: #24292f; display: flex; justify-content: center; padding: 50px; }
        .card { background: white; border: 1px solid #d0d7de; border-radius: 6px; width: 400px; padding: 24px; box-shadow: 0 3px 6px rgba(140,149,159,0.15); }
        h1 { font-size: 24px; border-bottom: 1px solid #d0d7de; padding-bottom: 10px; margin-top: 0; }
        ul { list-style: none; padding: 0; }
        li { padding: 12px 0; border-bottom: 1px solid #f6f8fa; }
        li:last-child { border-bottom: none; }
        a { color: #0969da; text-decoration: none; font-weight: 600; font-size: 18px; text-transform: uppercase; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Project Previews</h1>
        <ul>
<li><a href="/AppPreviews/*/">*</a></li>
        </ul>
    </div>
</body>
</html>
